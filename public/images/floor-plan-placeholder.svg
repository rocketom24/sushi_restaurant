<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" role="img" aria-labelledby="title">
  <title id="title">Restaurant floor plan placeholder</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16171d"/>
      <stop offset="100%" stop-color="#0b0c10"/>
    </linearGradient>
  </defs>
  <rect width="640" height="640" fill="url(#bg)"/>
  <rect x="24" y="24" width="592" height="592" rx="18" fill="none" stroke="#9b1b30" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- outer walls -->
  <rect x="70" y="70" width="500" height="500" fill="none" stroke="#f5e8c8" stroke-opacity="0.28" stroke-width="2"/>

  <!-- entrance -->
  <rect x="280" y="66" width="80" height="8" fill="#0b0c10"/>
  <path d="M280 70 a40 40 0 0 1 40 -40" fill="none" stroke="#f5e8c8" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- interior partition -->
  <line x1="70" y1="330" x2="300" y2="330" stroke="#f5e8c8" stroke-opacity="0.18" stroke-width="1.5"/>
  <line x1="380" y1="330" x2="570" y2="330" stroke="#f5e8c8" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- round tables -->
  <g fill="none" stroke="#9b1b30" stroke-width="2">
    <circle cx="150" cy="150" r="34"/>
    <circle cx="290" cy="150" r="34"/>
    <circle cx="430" cy="150" r="34"/>
    <circle cx="150" cy="250" r="34"/>
    <circle cx="430" cy="250" r="34"/>
  </g>
  <g fill="#9b1b30" fill-opacity="0.12">
    <circle cx="150" cy="150" r="34"/>
    <circle cx="290" cy="150" r="34"/>
    <circle cx="430" cy="150" r="34"/>
    <circle cx="150" cy="250" r="34"/>
    <circle cx="430" cy="250" r="34"/>
  </g>

  <!-- chairs around round tables -->
  <g fill="#f5e8c8" fill-opacity="0.35">
    <circle cx="150" cy="106" r="6"/>
    <circle cx="150" cy="194" r="6"/>
    <circle cx="106" cy="150" r="6"/>
    <circle cx="194" cy="150" r="6"/>

    <circle cx="290" cy="106" r="6"/>
    <circle cx="290" cy="194" r="6"/>
    <circle cx="246" cy="150" r="6"/>
    <circle cx="334" cy="150" r="6"/>

    <circle cx="430" cy="106" r="6"/>
    <circle cx="430" cy="194" r="6"/>
    <circle cx="386" cy="150" r="6"/>
    <circle cx="474" cy="150" r="6"/>

    <circle cx="150" cy="206" r="6"/>
    <circle cx="150" cy="294" r="6"/>
    <circle cx="106" cy="250" r="6"/>
    <circle cx="194" cy="250" r="6"/>

    <circle cx="430" cy="206" r="6"/>
    <circle cx="430" cy="294" r="6"/>
    <circle cx="386" cy="250" r="6"/>
    <circle cx="474" cy="250" r="6"/>
  </g>

  <!-- long communal table -->
  <rect x="110" y="400" width="420" height="60" rx="6" fill="#9b1b30" fill-opacity="0.12" stroke="#9b1b30" stroke-width="2"/>
  <g fill="#f5e8c8" fill-opacity="0.35">
    <circle cx="140" cy="390" r="5"/>
    <circle cx="190" cy="390" r="5"/>
    <circle cx="240" cy="390" r="5"/>
    <circle cx="290" cy="390" r="5"/>
    <circle cx="340" cy="390" r="5"/>
    <circle cx="390" cy="390" r="5"/>
    <circle cx="440" cy="390" r="5"/>
    <circle cx="490" cy="390" r="5"/>

    <circle cx="140" cy="470" r="5"/>
    <circle cx="190" cy="470" r="5"/>
    <circle cx="240" cy="470" r="5"/>
    <circle cx="290" cy="470" r="5"/>
    <circle cx="340" cy="470" r="5"/>
    <circle cx="390" cy="470" r="5"/>
    <circle cx="440" cy="470" r="5"/>
    <circle cx="490" cy="470" r="5"/>
  </g>

  <!-- window ticks along right wall -->
  <g stroke="#f5e8c8" stroke-opacity="0.28" stroke-width="2">
    <line x1="570" y1="130" x2="570" y2="170"/>
    <line x1="570" y1="200" x2="570" y2="240"/>
    <line x1="570" y1="270" x2="570" y2="310"/>
  </g>

  <!-- label -->
  <text x="320" y="560" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="3" fill="#f2ded4" fill-opacity="0.55">FLOOR PLAN</text>
</svg>
